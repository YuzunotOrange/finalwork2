<!DOCTYPE html>
<html>
<head>
<title>Chose your favourite things!!</title>
<style>
body {

}
.interest-choice {
  margin: 20px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 10px;
  cursor: pointer;
}
.interest-choice:hover {

}
</style>
</head>
<body>

<h1>Chose your favourite things!!</h1>

</div>

</div>

</div>

</div>

<div class="interest-choice">

</div>

<input type="submit" value="Submit">

</html>
