<!DOCTYPE html>
<html>
<head>
  <title>Chose your interesting things!!</title>
  <style>
    body {
      background-color: #FFC080; /* retro orange background */
      font-family: "Courier New", monospace; /* retro font */
      text-align: center;
    }

    h1 {
      font-size: 36px;
      color: #008000; /* retro green text */
      text-shadow: 2px 2px #FF0000; /* retro text shadow */
    }

   .interest-choice {
      margin: 20px;
      padding: 10px;
      border: 1px solid #CCCCCC;
      border-radius: 10px;
      background-color: #FFFFFF; /* retro white background */
      box-shadow: 2px 2px #AAAAAA; /* retro box shadow */
      cursor: pointer;
    }

   .interest-choice:hover {
      background-color: #FFFFCC; /* retro yellow hover background */
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 10px;
      border: 1px solid #CCCCCC;
      border-radius: 50%;
      background-color: #FFFFFF; /* retro white background */
    }

    input[type="submit"] {
      width: 100px;
      height: 30px;
      margin: 20px;
      border: 1px solid #CCCCCC;
      border-radius: 10px;
      background-color: #008000; /* retro green background */
      color: #FFFFFF; /* retro white text */
      font-size: 18px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #00FF00; /* retro bright green hover background */
    }
  </style>
</head>
<body>
  <h1>Chose your interesting things!!</h1>
  <br>

  <div class="interest-choice">
    <input type="checkbox" id="sports" name="interest[]" value="sports">
    <label for="sports">Sports</label>
  </div>

  <div class="interest-choice">
    <input type="checkbox" id="book" name="interest[]" value="book">
    <label for="book">Book</label>
  </div>

  <div class="interest-choice">
    <input type="checkbox" id="game" name="interest[]" value="game">
    <label for="game">Game</label>
  </div>

  <div class="interest-choice">
    <input type="checkbox" id="movie" name="interest[]" value="movie">
    <label for="movie">Movie</label>
  </div>

  <div class="interest-choice">
    <input type="checkbox" id="music" name="interest[]" value="music">
    <label for="music">Music</label>
  </div>

  <br><br>
  <input type="submit" value="Submit">
</body>
</html>
